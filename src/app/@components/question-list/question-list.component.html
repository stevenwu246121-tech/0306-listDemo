<!-- Page3 -->
<div class="survey-container">
  <div class="survey-content">
    @for (question of questions; track question.id) {
    <div class="question-item" style="margin-bottom: 2rem; border-bottom: 1px dashed #ccc; padding-bottom: 1rem;">
      <h3 class="question-title">{{ question.title }}</h3>

      <div class="select-all">
        <label>
          <input type="checkbox" (change)="toggleAll($event, question)"> 全選 / 全不選
        </label>
      </div>

      <div class="options-grid">
        @for (option of question.options; track option.id) {
        <label class="checkbox-wrapper" [class.active]="option.selected">
          <input type="checkbox" [name]="question.id + '-' + option.id"
            [(ngModel)]="option.selected" />
          <span class="option-label">{{ option.label }}</span>
        </label>
        }
      </div>
    </div>
    }
  </div>

  <div class="actions">
    <button mat-raised-button class="back-btn" (click)="goBack()">返回列表</button>
    <button mat-raised-button class="submit-btn" [disabled]="!isAnySelected()" (click)="submit()">
      送出問卷
    </button>
  </div>
</div>
