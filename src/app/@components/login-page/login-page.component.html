<p>login-page works!</p>

<!-- Page1 -->
<div class="loginPage1">
  <h1>問卷調查登入</h1>

  @if (message().text) {
    <div [class]="'alert ' + message().type">
      {{ message().text }}
    </div>
  }

  <div class="form-group">
    <label>姓名：</label>
    <input type="text" [(ngModel)]="name" [disabled]="isLoading()" placeholder="受測者姓名">
  </div>

  <div class="form-group">
    <label>信箱：</label>
    <input type="email" [(ngModel)]="email" [disabled]="isLoading()" placeholder="email">
  </div>

  <div class="form-group">
    <label>密碼：</label>
    <input type="password" [(ngModel)]="password" [disabled]="isLoading()" placeholder="密碼">
  </div>

  <div class="form-group">
    <label>手機：</label>
    <input type="text" [(ngModel)]="phone" [disabled]="isLoading()" placeholder="09xx-xxx-xxx">
  </div>

  <button mat-raised-button type="submit" (click)="onLogin()" [disabled]="isLoading()">
    {{ isLoading() ? '登入中...' : '確認登入' }}
  </button>
</div>
